rules:
  - id: ssh-dir-access
    pattern: '\.ssh/'
    severity: high
    scope: any
    ecosystem: "*"
    description: "Access to .ssh/ directory — SSH key theft"
    tags: [credential_access, filesystem]

  - id: aws-dir-access
    pattern: '\.aws/'
    severity: high
    scope: any
    ecosystem: "*"
    description: "Access to .aws/ directory — AWS credential theft"
    tags: [credential_access, filesystem]

  - id: dotenv-access
    pattern: '(?<![a-zA-Z0-9_])["''/]\.env\b'
    severity: medium
    scope: any
    ecosystem: "*"
    description: "Access to .env file — environment secrets"
    tags: [credential_access, filesystem]

  - id: npmrc-access
    pattern: '\.npmrc\b'
    severity: high
    scope: any
    ecosystem: "*"
    description: "Access to .npmrc — npm auth tokens"
    tags: [credential_access, filesystem]

  - id: pypirc-access
    pattern: '\.pypirc\b'
    severity: high
    scope: any
    ecosystem: "*"
    description: "Access to .pypirc — PyPI auth tokens"
    tags: [credential_access, filesystem]

  - id: env-token-access
    pattern: 'GITHUB_TOKEN|NPM_TOKEN|PYPI_TOKEN|AWS_SECRET'
    severity: high
    scope: any
    ecosystem: "*"
    description: "Access to well-known environment token variables"
    tags: [credential_access, env_var]
