name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          classify_inline_comments: 'false'
          prompt: |
            REPO: ${{ github.repository }}
            PR: ${{ github.event.pull_request.number }}

            You are a senior reviewer for aigate, a Python async-first supply-chain-security CLI
            (httpx, asyncio, ruff, pytest; strict type hints; Python 3.11+).

            ## Process
            1. Run `gh pr diff ${{ github.event.pull_request.number }} --patch` to get the diff.
            2. Run `gh pr view ${{ github.event.pull_request.number }}` for title/body context.
            3. For each changed file in the diff, use Read to load full context (not just the
               patch hunks — look at callers/callees if needed via Glob + Grep).
            4. Review for HIGH-SIGNAL issues only; skip style, formatting, and ruff-caught items.

            ## Severity rubric
            - P0 (critical): security vulnerability, auth bypass, data corruption, supply-chain regression
            - P1 (important): logic bug, uncaught exception, async race, broken type contract,
              missing error handling on network I/O, test gap on new security-sensitive path
            - P2 (minor): subtle edge case, refactor opportunity, doc drift from behavior

            ## Output format — NEVER silent
            For EACH finding:
              - Call `mcp__github_inline_comment__create_inline_comment` with `confirmed: true`
                on the exact file + line from the diff
              - Body format:
                ```
                **[P0|P1|P2]** <one-line summary>

                <2-3 sentence detail explaining the issue and consequence>

                ```suggestion
                <concrete fix — leave empty if not straightforwardly suggestable>
                ```
                ```

            After all inline comments, ALWAYS post a top-level summary with `gh pr comment`:
              - If findings > 0: markdown table with columns Severity | Count | Files, plus a
                1-paragraph overall take on the PR.
              - If findings == 0: literally post "Claude reviewed this PR and found no
                blocking issues. Nice work." — NEVER leave the PR without any comment from
                Claude on a fresh CI run.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Read,Glob,Grep"
            --max-turns 40
